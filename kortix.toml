kortix_version = 1

[project]
name = "Knowledge Worker Demo"
description = "Demo project showing a general knowledge-worker skill library."

[env]
required = []
optional = [ "ANTHROPIC_API_KEY", "OPENAI_API_KEY" ]

[sandbox]
dockerfile = "Dockerfile"
context = "."

[[triggers]]
slug = "test"
name = "test"
type = "cron"
agent = "default"
enabled = true
cron = "0 0 9 * * *"
timezone = "UTC"
prompt = "s12312321"
